<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Into the Grape Vine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 360px;
      min-height: 200px;
      padding: 16px;
      background: #fff;
      color: #111;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 2px; color: #6b2d8b; }
    .subtitle { font-size: 11px; color: #999; margin-bottom: 14px; }
    .status { font-size: 12px; color: #555; margin-bottom: 12px; min-height: 18px; line-height: 1.5; }
    .status.error { color: #c0392b; }
    .status.success { color: #27ae60; }
    .btn-row { margin-bottom: 12px; }
    .btn {
      display: inline-block; padding: 7px 14px; border: none;
      border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; margin-right: 6px;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn-primary { background: #6b2d8b; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #57246f; }
    .btn-secondary { background: #eee; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #ddd; }
    .queue-header { font-weight: 600; font-size: 12px; margin-bottom: 6px; border-top: 1px solid #eee; padding-top: 10px; color: #444; }
    .order-list { max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px; }
    .order-row { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border-bottom: 1px solid #f3f3f3; }
    .order-row:last-child { border-bottom: none; }
    .order-thumb { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; border: 1px solid #eee; border-radius: 3px; background: #f5f5f5; }
    .order-info { flex: 1; min-width: 0; }
    .order-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
    .order-meta { color: #888; font-size: 11px; margin-top: 2px; }
    .empty { color: #aaa; font-style: italic; padding: 16px; text-align: center; font-size: 12px; }
    .page-hint { font-size: 11px; color: #999; margin-top: 10px; line-height: 1.5; }
    .progress { font-size: 11px; color: #666; font-style: italic; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🍇 Into the Grape Vine</h1>
  <div class="subtitle">Amazon Vine order tracker</div>
  <div id="status" class="status"></div>

  <!-- Vine Orders Section -->
  <div class="btn-row">
    <button id="btn-extract" class="btn btn-primary">Extract Vine Orders</button>
    <button id="btn-clear" class="btn btn-secondary">Clear</button>
  </div>
  <div class="queue-header">Vine orders (<span id="queue-count">0</span>)</div>
  <div class="order-list" id="order-list">
    <div class="empty">Nothing captured yet.</div>
  </div>

  <!-- Account Orders Section -->
  <div class="btn-row" style="margin-top: 16px;">
    <button id="btn-extract-orders" class="btn btn-primary">Extract Account Orders</button>
    <button id="btn-clear-orders" class="btn btn-secondary">Clear</button>
  </div>
  <div class="queue-header">Account orders (<span id="account-count">0</span>)</div>
  <div class="order-list" id="account-list">
    <div class="empty">Nothing captured yet.</div>
  </div>

  <!-- Sync Section -->
  <div class="btn-row" style="margin-top: 12px;">
    <button id="btn-sync" class="btn btn-primary" style="width: 100%;">🔄 Sync Delivery Dates to Dropbox</button>
  </div>
  <div class="progress" id="sync-progress"></div>

  <div class="page-hint" id="page-hint"></div>

  <script src="popup.js"></script>
</body>
</html>
